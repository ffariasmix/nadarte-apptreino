<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nad'Arte · App Treino (Acompanhamento) — ao vivo</title>
<style>
  :root{--bg:#F5F4F1;--card:#fff;--ink:#2D2D2D;--orange:#E8521A;--green:#5BAD6F;--amber:#F0A500;
    --red:#D64545;--blue:#3E7CB1;--muted:#8A8A8A;--line:#EAE7E2;--soft:#FAF8F5;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 18px rgba(0,0,0,.05)}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;font-size:14px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  header{background:linear-gradient(180deg,#fff,#fdfcfb);border-bottom:1px solid var(--line)}
  .hd{display:flex;align-items:center;gap:15px;padding:16px 0;flex-wrap:wrap}
  .logo{width:44px;height:44px;border-radius:12px;background:var(--orange);display:flex;align-items:center;
    justify-content:center;color:#fff;font-weight:800;font-size:19px;flex:0 0 auto}
  .htxt h1{margin:0;font-size:18px;font-weight:800}.htxt p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
  .asof{margin-left:auto;color:var(--muted);font-size:12px}
  .live{display:inline-flex;align-items:center;gap:6px;background:#E7F4EB;color:#3f8a52;font-weight:700;
    font-size:11.5px;padding:5px 11px;border-radius:999px}
  .live::before{content:"";width:8px;height:8px;border-radius:50%;background:#3f8a52}
  main{padding:22px 0 60px}
  .sec{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:26px 0 12px}
  .sec:first-child{margin-top:0}
  .kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .kpi .n{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;
    display:flex;align-items:center;gap:7px}
  .kpi .dot{width:9px;height:9px;border-radius:3px}
  .kpi .v{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:9px 0 2px;line-height:1}
  .kpi .s{font-size:12px;color:var(--muted)}
  .kpi.f2{opacity:.7}.kpi.f2 .v{font-size:15px;color:var(--muted)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);
    font-weight:700;padding:10px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:11px 10px;border-bottom:1px solid var(--line)}tr:last-child td{border:none}
  .tbl{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  .chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .c-red{background:#FBE8E8;color:#b53434}.c-amber{background:#FDF3DC;color:#a97c00}.c-green{background:#E7F4EB;color:#3f8a52}
  .note{background:#FFF8F1;border:1px solid #f6d3bd;border-radius:11px;padding:14px 16px;font-size:12.5px;color:#7a4a2a;margin-top:16px}
  footer{border-top:1px solid var(--line);color:var(--muted);font-size:12px;padding:18px 0;text-align:center}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:40px;text-align:center;color:var(--muted)}
  @media(max-width:820px){.kgrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:460px){.kgrid{grid-template-columns:1fr}.asof{margin-left:0;width:100%}}
</style>
</head>
<body>
<header><div class="wrap hd">
  <div class="logo">N</div>
  <div class="htxt"><h1>App Treino (Acompanhamento)</h1><p>Comportamento do aluno &amp; atuação do professor — Nad'Arte</p></div>
  <span class="asof"><span class="live">AO VIVO · API Pacto</span> &nbsp; Atualizado: <b id="asof">—</b></span>
</div></header>
<main class="wrap" id="app"></main>
<footer class="wrap">Dados ao vivo da API Pacto (BI Treino) · Connect-IN Digital · atualização automática via GitHub Actions</footer>

<script>
window.DATA = /*__DATA__*/null;

(function(){
  const app = document.getElementById('app');
  const D = window.DATA;
  if(!D || !D.unidades || !D.unidades.length){
    app.innerHTML = '<div class="empty"><b>Aguardando a primeira coleta.</b><br>Rode o workflow "Coleta + Publica" no GitHub Actions para preencher os dados reais.</div>';
    return;
  }
  const U = D.unidades;
  const fmt = n => (n==null||isNaN(n)) ? '—' : Math.round(n).toLocaleString('pt-BR');
  const pct = n => (n==null||isNaN(n)) ? '—' : (Math.round(n*10)/10).toLocaleString('pt-BR')+'%';
  const sum = k => U.reduce((a,u)=> a + (Number(u[k])||0), 0);
  const wavg = (k,w) => { let n=0,d=0; U.forEach(u=>{const ww=Number(u[w])||0; if(u[k]!=null){n+=Number(u[k])*ww; d+=ww;}}); return d?n/d:null; };
  if(D.gerado_em){ try{ document.getElementById('asof').textContent = new Date(D.gerado_em).toLocaleString('pt-BR'); }catch(e){} }

  const totAlunos = sum('totalAlunos');
  const K = [
    {n:'Treinos realizados', dot:'#E8521A', v:fmt(sum('treinosExecutados')), s:'execuções (gerados: '+fmt(sum('treinosGerados'))+')'},
    {n:'Treinos em dia', dot:'#5BAD6F', v:fmt(sum('totalTreinosEmDia')), s:pct(wavg('percentualEmDia','totalAlunos'))+' da base'},
    {n:'Treinos vencidos', dot:'#D64545', v:fmt(sum('totalTreinosVencidos')), s:'a renovar: '+fmt(sum('totalTreinosRenovar'))},
    {n:'Avaliações realizadas', dot:'#3E7CB1', v:fmt(sum('avaliacoesRealizadas')), s:'últimos 12 meses'},
    {n:'Avaliações vencidas', dot:'#F0A500', v:fmt(sum('avaliacoesAtrasadas')), s:'atrasadas/reavaliar'},
    {n:'Uso do App Treino', dot:'#8B5CF6', v:pct(wavg('percUtilizamApp','totalAlunos')), s:fmt(totAlunos)+' alunos na base'},
    {n:'Atendimento (professores)', dot:'#0EA5A0', v:fmt(sum('acompanhamentoEm')), s:'alunos em acompanhamento'},
    {n:'Nota do treino (NPS)', dot:'#9a9a9a', v:'fase 2', s:'nota por aluno — em integração', f2:true},
  ];
  let html = '<div class="sec">Panorama da rede — '+fmt(U.length)+' unidades</div><div class="kgrid">';
  html += K.map(c=>`<div class="kpi ${c.f2?'f2':''}"><div class="n"><span class="dot" style="background:${c.dot}"></span>${c.n}</div><div class="v">${c.v}</div><div class="s">${c.s}</div></div>`).join('');
  html += '</div>';

  const bd = U.map(u=>({label:u.nome, value:Number(u.treinosExecutados)||0})).sort((a,b)=>b.value-a.value);
  const max = Math.max(...bd.map(b=>b.value),1), w=560, padL=110, padR=60, rowH=34, h=bd.length*rowH+8;
  let svg = `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-height:${h}px">`;
  bd.forEach((d,i)=>{const y=i*rowH+6, bw=(w-padL-padR)*(d.value/max);
    svg+=`<text x="${padL-8}" y="${y+16}" text-anchor="end" font-size="12.5" font-weight="600" fill="#2D2D2D">${d.label}</text>`;
    svg+=`<rect x="${padL}" y="${y+4}" width="${w-padL-padR}" height="16" rx="6" fill="#EEEAE4"/>`;
    svg+=`<rect x="${padL}" y="${y+4}" width="${Math.max(2,bw)}" height="16" rx="6" fill="#E8521A"/>`;
    svg+=`<text x="${padL+Math.max(2,bw)+8}" y="${y+16}" font-size="12" font-weight="700" fill="#6a6a6a">${fmt(d.value)}</text>`;});
  svg+='</svg>';
  html += '<div class="sec">Treinos executados por unidade</div><div class="panel">'+svg+'</div>';

  const cols = [['nome','Unidade'],['totalAlunos','Alunos'],['percUtilizamApp','Uso app'],['treinosExecutados','Execuções'],
    ['totalTreinosEmDia','Em dia'],['totalTreinosVencidos','Vencidos'],['avaliacoesRealizadas','Aval. feitas'],
    ['avaliacoesAtrasadas','Aval. vencidas'],['acompanhamentoEm','Acompanh.']];
  let rows = U.map(u=>`<tr>
    <td><b>${u.nome}</b></td>
    <td>${fmt(u.totalAlunos)}</td>
    <td>${pct(u.percUtilizamApp)}</td>
    <td>${fmt(u.treinosExecutados)}</td>
    <td>${fmt(u.totalTreinosEmDia)}</td>
    <td><span class="chip ${(Number(u.totalTreinosVencidos)||0)>0?'c-red':'c-green'}">${fmt(u.totalTreinosVencidos)}</span></td>
    <td>${fmt(u.avaliacoesRealizadas)}</td>
    <td><span class="chip ${(Number(u.avaliacoesAtrasadas)||0)>0?'c-amber':'c-green'}">${fmt(u.avaliacoesAtrasadas)}</span></td>
    <td>${fmt(u.acompanhamentoEm)}</td></tr>`).join('');
  html += '<div class="sec">Comparativo por unidade</div><div class="tbl"><div class="scroll"><table><thead><tr>'
    + cols.map(c=>`<th>${c[1]}</th>`).join('') + '</tr></thead><tbody>' + rows + '</tbody></table></div></div>';

  html += '<div class="note"><b>Cobertura atual (fase 1):</b> 7 dos 8 indicadores vêm ao vivo do BI Treino da Pacto, agregados por unidade. A <b>nota do treino (KPI 7)</b> e o detalhe por aluno/professor (CRM 360º) entram na fase 2.</div>';

  app.innerHTML = html;
})();
</script>
</body>
</html>
