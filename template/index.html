<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nad'Arte · App Treino (Acompanhamento) — ao vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('nadarte-theme');if(t!=='dark'&&t!=='light')t='light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root{
    /* Brand Book Digital Nad'Arte v1.0 — tokens */
    --bg:#F5F4F1;--card:#fff;--surface:#fff;--black:#1A1A1A;--ink:#2D2D2D;
    --orange:#E8521A;--color-primary:#E8521A;--color-primary-soft:#FBE2D7;--color-primary-dark:#A33A10;
    --green:#5BAD6F;--green-soft:#E2F1E7;--amber:#F2C94C;--amber-soft:#FCF1CF;
    --red:#D64545;--red-soft:#F8DEDE;--blue:#3E6DAA;--blue-soft:#E1EAF5;
    --purple:#7A5AA8;--purple-soft:#F0EAFA;
    --muted:#6B7280;--line:#E7E3DD;--soft:#FAF8F5;
    --font-primary:'Inter',system-ui,-apple-system,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --chart-1:#E8521A;--chart-2:#3E6DAA;--chart-3:#5BAD6F;--chart-4:#F2C94C;--chart-5:#7A5AA8;--chart-6:#D64545;
    --shadow:0 1px 4px rgba(45,45,45,.06),0 6px 20px rgba(45,45,45,.06);
    /* escala tipografica (padrao unico do front) */
    --fs-metric:28px;  /* numero grande (KPI) */
    --fs-title:19px;   /* titulo de pagina */
    --fs-card:15px;    /* titulo de card/painel */
    --fs-body:13.5px;  /* texto corrido / tabela */
    --fs-eyebrow:12.5px;/* rotulo de secao (uppercase) */
    --fs-caption:12px; /* legenda / subtexto */
    --fs-label:11px;   /* micro-rotulo (KPI, thead) */}
  *{box-sizing:border-box}html,body{margin:0}body{background:var(--bg);color:var(--ink);
    font-family:var(--font-primary);font-size:14px;line-height:1.45}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}
  header{background:linear-gradient(180deg,#fff,#fdfcfb);border-bottom:1px solid var(--line)}
  .hd{display:flex;align-items:center;gap:16px;padding:15px 0;flex-wrap:wrap}
  img.logo{height:42px;width:auto;display:block;flex:0 0 auto}
  .htxt h1{margin:0;font-size:var(--fs-title);font-weight:800;letter-spacing:-.3px}
  .htxt p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
  .asof{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:10px}
  .live{display:inline-flex;align-items:center;gap:6px;background:#E7F4EB;color:#3f8a52;font-weight:700;font-size:11.5px;padding:5px 11px;border-radius:999px}
  .live::before{content:"";width:8px;height:8px;border-radius:50%;background:#3f8a52;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .filters{background:var(--soft);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .fbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:11px 0}
  .flab{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-right:6px}
  .chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
  .chip:hover{border-color:#f6d3bd}.chip.on{background:var(--orange);border-color:var(--orange);color:#fff}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-top:8px;overflow-x:auto}
  .tab{background:none;border:none;padding:12px 16px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;font-family:inherit}
  .tab:hover{color:var(--ink)}.tab.on{color:var(--orange);border-bottom-color:var(--orange)}
  main{padding:22px 0 60px}.view{display:none}.view.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .sec{font-size:var(--fs-eyebrow);font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:26px 0 12px}
  .sec:first-child{margin-top:0}
  .kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .kpi .n{font-size:var(--fs-label);font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:7px}
  .kpi .dot{width:9px;height:9px;border-radius:3px}
  .kpi .v{font-size:var(--fs-metric);font-weight:800;letter-spacing:-.6px;margin:9px 0 2px;line-height:1}
  .kpi .s{font-size:var(--fs-caption);color:var(--muted)}
  .g2{display:grid;grid-template-columns:1.2fr 1fr;gap:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}  /* graficos em 2x2 no desktop */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .panel h3{margin:0 0 4px;font-size:var(--fs-card);font-weight:800}.panel .sub{color:var(--muted);font-size:var(--fs-caption);margin:0 0 14px}
  .ugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .ucard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .ucard .un{font-weight:800;font-size:15px}.ucard .ual{color:var(--muted);font-size:12px;margin-top:1px}
  .ucard .urow{display:flex;justify-content:space-between;font-size:12.5px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
  table{width:100%;border-collapse:collapse;font-size:var(--fs-body)}
  th{text-align:left;font-size:var(--fs-label);text-transform:uppercase;letter-spacing:.3px;color:var(--muted);font-weight:700;padding:10px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:11px 10px;border-bottom:1px solid var(--line)}tr:last-child td{border:none}
  .tbl{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}.scroll{overflow-x:auto}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .hbtn{font-size:11.5px;font-weight:600;padding:4px 12px;border-radius:999px;border:1px solid var(--color-border,#E7E3DD);background:var(--color-surface,#fff);color:var(--muted,#6B7280);cursor:pointer}
  .hbtn.on{background:#7A5AA8;border-color:#7A5AA8;color:#fff}
  [data-theme="dark"] .hbtn{background:#26241f;border-color:#403c37;color:#b8b2a8}
  [data-theme="dark"] .hbtn.on{background:#7A5AA8;border-color:#7A5AA8;color:#fff}
  .c-red{background:#F8DEDE;color:#A11010}.c-amber{background:#FCF1CF;color:#7A5A00}.c-green{background:#E2F1E7;color:#2F6B3A}.c-gray{background:#EEF1F6;color:#5a6b86}
  .bar{height:7px;border-radius:5px;background:#EEEAE4;overflow:hidden;min-width:70px;flex:1}.bar>i{display:block;height:100%;border-radius:5px}
  .note{background:#FFF8F1;border:1px solid #f6d3bd;border-radius:11px;padding:14px 16px;font-size:var(--fs-caption);color:#7a4a2a;margin-top:14px}
  .meth{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
  .meth h3{margin:0 0 3px;font-size:16px;font-weight:800}.meth .sub{color:var(--muted);font-size:12.5px;margin:0 0 16px}
  .map th{background:var(--soft)}.map code{background:var(--soft);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:11.5px;font-family:ui-monospace,Menlo,monospace;color:#c7420f}
  .road{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .roadcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .roadcard .t{font-weight:800;font-size:15px;margin-bottom:4px}.roadcard .d{color:var(--muted);font-size:12.5px}
  .badge{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:4px 9px;border-radius:999px;background:#EEF1F6;color:#5a6b86;margin-top:10px}
  footer{border-top:1px solid var(--line);color:var(--muted);font-size:12px;padding:18px 0;text-align:center}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:40px;text-align:center;color:var(--muted)}
  .av{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;background:var(--orange);position:relative;overflow:hidden}
  .avimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .aluno-cell{display:flex;align-items:center;gap:10px}.aluno-cell .nm{font-weight:700}.aluno-cell .ct{font-size:11px;color:var(--muted)}
  .subf{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:14px 0 4px}
  .filterbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin:14px 0}
  .fld{display:flex;flex-direction:column;gap:4px;min-width:0}
  .fld>label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .fsel,.finp{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:var(--card);color:var(--ink);width:100%;max-width:100%}
  .fsel:focus,.finp:focus{outline:none;border-color:var(--orange)}
  th.sortable{cursor:pointer;user-select:none}th.sortable:hover{color:var(--ink)}
  th .sar{font-size:9px;margin-left:3px;color:var(--orange)}
  .srch{border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;font-family:inherit;min-width:180px;flex:1;max-width:280px}
  .srch:focus{outline:none;border-color:var(--orange)}
  .pager{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;flex-wrap:wrap;border-top:1px solid var(--line)}
  .pbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit}
  .pbtn:disabled{opacity:.4;cursor:default}
  .stack{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-top:6px}
  tbody tr.click{cursor:pointer}tbody tr.click:hover{background:var(--soft)}
  td.muted{color:var(--muted)}
  .modal{position:fixed;top:0;left:0;inset:0;width:100vw;height:100vh;height:100dvh;background:rgba(45,45,45,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:18px;overflow:auto}
  .modal.on{display:flex}
  .modalc{background:#fff;border-radius:16px;max-width:640px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:88vh;overflow:auto;position:relative}
  .pmx{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  @media(max-width:900px){.kgrid{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.ugrid{grid-template-columns:1fr}.road{grid-template-columns:1fr}}
  @media(max-width:640px){
    .filterbar{grid-template-columns:1fr 1fr}
    .rtable table,.rtable thead,.rtable tbody,.rtable tr,.rtable td{display:block}
    .rtable thead{position:absolute;left:-9999px;height:0;overflow:hidden}
    .rtable tr{border:1px solid var(--line);border-radius:12px;margin:0 6px 10px;padding:4px 2px;background:var(--card)}
    .rtable td{border:none;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;gap:12px;text-align:right}
    .rtable td::before{content:attr(data-label);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);text-align:left;flex:0 0 auto}
    .rtable td:first-child{justify-content:flex-start;text-align:left}
    .rtable td:first-child::before{display:none}
    .rtable .pager{flex-direction:column;align-items:stretch;gap:8px}
  }
  @media(max-width:460px){.kgrid{grid-template-columns:1fr}.asof{margin-left:0;width:100%}.filterbar{grid-template-columns:1fr}}
  /* botão de alternar tema */
  .tbtn{background:var(--card);border:1px solid var(--line);border-radius:999px;width:34px;height:34px;cursor:pointer;font-size:15px;line-height:1;display:inline-flex;align-items:center;justify-content:center;color:var(--ink);flex:0 0 auto;margin-left:10px;transition:var(--transition-base,all .2s ease)}
  .tbtn:hover{border-color:var(--orange)}
  /* ===================== DARK MODE (extensão, fora do brand light-first) ===================== */
  [data-theme="dark"]{
    --bg:#161616;--card:#1F1F1F;--surface:#1F1F1F;--soft:#242322;--ink:#ECEAE6;--muted:#9A968F;--line:#333130;
    --shadow:0 1px 4px rgba(0,0,0,.45),0 8px 24px rgba(0,0,0,.40);
  }
  [data-theme="dark"] body{background:var(--bg);color:var(--ink)}
  [data-theme="dark"] header{background:linear-gradient(180deg,#1F1F1F,#191919)}
  [data-theme="dark"] .chip{background:#242322}
  [data-theme="dark"] .chip.on{background:var(--orange);border-color:var(--orange);color:#fff}
  [data-theme="dark"] .modalc{background:var(--card)}
  [data-theme="dark"] .pbtn{background:var(--card);color:var(--ink)}
  [data-theme="dark"] .srch{background:var(--card);color:var(--ink)}
  [data-theme="dark"] .note{background:#2A211B;border-color:#5A3D2A;color:#E6C3A8}
  [data-theme="dark"] .live{background:rgba(91,173,111,.18);color:#8FD3A3}
  [data-theme="dark"] .live::before{background:#8FD3A3}
  [data-theme="dark"] .bar{background:#333130}
  [data-theme="dark"] .c-green{background:rgba(91,173,111,.20);color:#8FD3A3}
  [data-theme="dark"] .c-amber{background:rgba(242,201,76,.20);color:#EAD48A}
  [data-theme="dark"] .c-red{background:rgba(214,69,69,.22);color:#F0A3A3}
  [data-theme="dark"] .c-gray{background:rgba(155,150,143,.20);color:#C3BEB6}
  [data-theme="dark"] .map code,[data-theme="dark"] .meth code{background:#242322}
  /* SVG: recolorir texto/trilho/grade fixos (seletor por atributo — não toca dados) */
  [data-theme="dark"] svg text[fill="#2D2D2D"]{fill:#E6E4E0}
  [data-theme="dark"] svg text[fill="#8A8A8A"],[data-theme="dark"] svg text[fill="#6a6a6a"]{fill:#9A968F}
  [data-theme="dark"] svg rect[fill="#EEEAE4"]{fill:#333130}
  [data-theme="dark"] svg line[stroke="#EEEAE4"]{stroke:#333130}
</style>
</head>

<script>
window.DATA = /*__DATA__*/null;
(function(){
  const D = window.DATA;
  const root = document.querySelector('main');
  if(!D || !D.unidades || !D.unidades.length){
    root.innerHTML = '<div class="empty" style="margin-top:24px"><b>Aguardando a primeira coleta.</b><br>Rode o workflow "Coleta + Publica" com deploy=true.</div>';
    return;
  }
  const ALL = D.unidades;
  const fmt = n => (n==null||isNaN(n)) ? '—' : Math.round(n).toLocaleString('pt-BR');
  const pct = n => (n==null||isNaN(n)) ? '—' : (Math.round(n*10)/10).toLocaleString('pt-BR')+'%';
  const N = v => Number(v)||0;
  if(D.gerado_em){ try{ document.getElementById('asof').textContent = new Date(D.gerado_em).toLocaleString('pt-BR'); }catch(e){} }

  let state = {unit:'all', tab:'geral', crmFaixa:'all', crmPub:'all', crmMod:'all', crmProf:'all', crmContrato:'all', crmTreino:'all', crmRec:'all', crmIsa:'all', crmQ:'', crmPage:1, crmSort:{k:null,dir:1}, profSort:{k:null,dir:1}, scoreIni:'all', scoreProf:'all', scoreContrato:'all', scoreQ:'', scorePage:1, scoreSort:{k:null,dir:1}, histPeriod:'dia'};
  const sel = () => state.unit==='all' ? ALL : ALL.filter(u=>u.id===state.unit);
  const sum = k => sel().reduce((a,u)=>a+N(u[k]),0);
  const wavg = (k,w) => { let n=0,d=0; sel().forEach(u=>{const ww=N(u[w]); if(u[k]!=null){n+=Number(u[k])*ww; d+=ww;}}); return d?n/d:null; };
  // Guard-rail automático: média ponderada que EXCLUI outliers (valor atípico vs. mediana das demais).
  // Auto-liga quando há anomalia e auto-desliga quando o dado normaliza. Vale p/ qualquer unidade.
  const sumOf = (uu,k) => uu.reduce((a,u)=>a+N(u[k]),0);
  const wavgOf = (uu,k,w) => { let n=0,d=0; uu.forEach(u=>{const ww=N(u[w]); if(u[k]!=null){n+=Number(u[k])*ww; d+=ww;}}); return d?n/d:null; };
  const wavgRobusto = (k,w) => {
    const arr = sel().filter(u=>u[k]!=null).map(u=>({nome:u.nome, v:Number(u[k]), w:N(u[w])}));
    if(arr.length<3) return {v: wavg(k,w), fora:[]};
    const ord = arr.map(x=>x.v).slice().sort((a,b)=>a-b);
    const med = ord[Math.floor(ord.length/2)] || 0;
    const fora=[], ok=[];
    arr.forEach(x=>{ (med>0 && x.v > med*4 && x.v > 180) ? fora.push(x.nome) : ok.push(x); });
    let n=0,d=0; ok.forEach(x=>{n+=x.v*x.w; d+=x.w;});
    return {v: d? n/d : null, fora};
  };

  function hbars(rows, color, fmtVal){
    const max=Math.max(...rows.map(r=>r.value),1), w=520,padL=104,padR=64,rowH=32,h=rows.length*rowH+6;
    let s=`<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-height:${h}px">`;
    rows.sort((a,b)=>b.value-a.value).forEach((d,i)=>{const y=i*rowH+4,bw=(w-padL-padR)*(d.value/max);
      s+=`<text x="${padL-8}" y="${y+15}" text-anchor="end" font-size="12" font-weight="600" fill="#2D2D2D">${d.label}</text>`;
      s+=`<rect x="${padL}" y="${y+3}" width="${w-padL-padR}" height="15" rx="6" fill="#EEEAE4"/>`;
      s+=`<rect x="${padL}" y="${y+3}" width="${Math.max(2,bw)}" height="15" rx="6" fill="${color}"/>`;
      s+=`<text x="${padL+Math.max(2,bw)+8}" y="${y+15}" font-size="11.5" font-weight="700" fill="#6a6a6a">${fmtVal(d.value)}</text>`;});
    return s+'</svg>';
  }
  function donut(segs){
    const tot=segs.reduce((a,s)=>a+s.value,0)||1; const cx=90,cy=95,r=70,rin=46; let ang=-Math.PI/2;
    let s=`<svg viewBox="0 0 330 195" width="100%" style="max-width:330px;display:block">`;
    segs.forEach(seg=>{const a2=ang+2*Math.PI*(seg.value/tot);
      const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
      const xi1=cx+rin*Math.cos(a2),yi1=cy+rin*Math.sin(a2),xi2=cx+rin*Math.cos(ang),yi2=cy+rin*Math.sin(ang);
      const big=(a2-ang)>Math.PI?1:0;
      s+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${big} 1 ${x2} ${y2} L${xi1} ${yi1} A${rin} ${rin} 0 ${big} 0 ${xi2} ${yi2} Z" fill="${seg.color}"/>`; ang=a2;});
    s+=`<text x="90" y="92" text-anchor="middle" font-size="23" font-weight="800" fill="#2D2D2D">${tot?Math.round(segs[0].value/tot*100):0}%</text>`;
    s+=`<text x="90" y="110" text-anchor="middle" font-size="10.5" fill="#8A8A8A">em dia</text>`;
    let ly=34; segs.forEach(seg=>{s+=`<rect x="195" y="${ly}" width="12" height="12" rx="3" fill="${seg.color}"/><text x="214" y="${ly+11}" font-size="12.5" fill="#2D2D2D">${seg.label}</text><text x="320" y="${ly+11}" font-size="12.5" font-weight="700" text-anchor="end" fill="#6a6a6a">${fmt(seg.value)}</text>`; ly+=30;});
    return s+'</svg>';
  }
  function lineChart(pts, keys){
    const w=560,h=180,padL=30,padB=22,padT=12,padR=12,xs=pts.length;
    let allv=[]; pts.forEach(p=>keys.forEach(k=>{const v=p[k.k]; if(v!=null&&isFinite(v))allv.push(v);}));
    const max=Math.max(...allv,100), min=Math.min(...allv,0);
    const X=i=>padL+(w-padL-padR)*(xs<2?0.5:i/(xs-1)), Y=v=>padT+(h-padT-padB)*(1-(v-min)/(max-min||1));
    let s=`<svg viewBox="0 0 ${w} ${h}" width="100%">`;
    [0,.5,1].forEach(g=>{const y=padT+(h-padT-padB)*g; s+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#EEEAE4"/>`;});
    const step=Math.max(1,Math.ceil(xs/8));
    pts.forEach((p,i)=>{ if(i%step===0) s+=`<text x="${X(i)}" y="${h-6}" text-anchor="middle" font-size="9.5" fill="#8A8A8A">${p.lbl||''}</text>`;});
    keys.forEach(k=>{ let d='',pen=false; pts.forEach((p,i)=>{const v=p[k.k]; if(v==null||!isFinite(v)){pen=false;return;} d+=(pen?'L':'M')+X(i)+' '+Y(v)+' '; pen=true;});
      s+=`<path d="${d}" fill="none" stroke="${k.c}" stroke-width="2.5" stroke-linejoin="round"/>`;
      pts.forEach((p,i)=>{const v=p[k.k]; if(v==null||!isFinite(v))return; s+=`<circle cx="${X(i)}" cy="${Y(v)}" r="3" fill="${k.c}"/>`;});});
    s+='</svg>';
    return s+'<div style="margin-top:4px">'+keys.map(k=>`<span style="font-size:12px;color:var(--muted);margin-right:14px"><b style="color:${k.c}">■</b> ${k.n}</span>`).join('')+'</div>';
  }
  function histBucket(dstr,per){ const p=String(dstr).split('-').map(Number),y=p[0],m=p[1],dd=p[2];
    if(per==='mes') return y+'-'+String(m).padStart(2,'0');
    if(per==='ano') return String(y);
    if(per==='semana'){ const dt=new Date(y,m-1,dd),j=new Date(y,0,1); const wk=Math.ceil((((dt-j)/86400000)+j.getDay()+1)/7); return y+'-S'+String(wk).padStart(2,'0'); }
    return String(dstr); }
  function histLabel(k,per){ const MES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    if(per==='mes'){ const a=k.split('-'); return MES[+a[1]-1]+'/'+a[0].slice(2); }
    if(per==='ano') return k;
    if(per==='semana') return 'S'+k.split('-S')[1];
    return k.slice(8)+'/'+k.slice(5,7); }
  function histPanel(){
    const H=(D.historico||[]);
    const daily=H.map(s=>{ let uso,emdia,nota;
      if(state.unit==='all'){ uso=N(s.rede&&s.rede.usoApp); emdia=N(s.rede&&s.rede.emDiaPct); nota=(s.rede&&s.rede.nota); }
      else { const u=(s.unidades||[]).find(x=>x.id===state.unit)||{}; uso=N(u.usoApp); emdia=N(u.emDiaPct); nota=u.nota; }
      return {d:s.data, uso, emdia, satisf:(nota==null?null:Math.round(N(nota)/5*1000)/10)}; });
    const per=state.histPeriod||'dia';
    let pts;
    if(per==='dia'){ pts=daily.map(p=>({lbl:histLabel(p.d,'dia'),uso:p.uso,emdia:p.emdia,satisf:p.satisf})); }
    else { const g={}; daily.forEach(p=>{const k=histBucket(p.d,per);(g[k]=g[k]||[]).push(p);});
      pts=Object.keys(g).sort().map(k=>{ const arr=g[k]; const avg=f=>{const v=arr.map(x=>x[f]).filter(x=>x!=null&&isFinite(x)); return v.length? Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10 : null;};
        return {lbl:histLabel(k,per),uso:avg('uso'),emdia:avg('emdia'),satisf:avg('satisf')}; }); }
    const temNota=pts.some(p=>p.satisf!=null);
    const series=[{k:'uso',n:'Uso do app (%)',c:'#7A5AA8'},{k:'emdia',n:'Fichas em dia (%)',c:'#5BAD6F'}];
    if(temNota) series.push({k:'satisf',n:'Satisfação (nota÷5, %)',c:'#F2C94C'});
    const PL={dia:'Diário',semana:'Semanal',mes:'Mensal',ano:'Anual'};

  // ---------- Índice de METAS (0–100) — pesos definidos pela rede ----------
  function metasFor(unitId){
    const uu = unitId==='all' ? ALL : ALL.filter(u=>u.id===unitId);
    const eligB = (D.alunos||[]).filter(a => (unitId==='all'||a.unit===unitId) && ELEG(a));  // público-alvo
    const el = eligB.length||1;
    const appUsers = eligB.filter(a=>a.usaApp===true);   // quem usa o app (base dos pilares abaixo)
    const au = appUsers.length||1;
    const usoApp = appUsers.length/el*100;                                    // % apta que usa o app
    const treino = appUsers.filter(a=>a.treinoStatus==='emdia').length/au*100; // % de quem usa o app com treino em dia
    const rea=sumOf(uu,'avaliacoesRealizadas'), atr=sumOf(uu,'avaliacoesAtrasadas');
    const aval=(rea+atr)? rea/(rea+atr)*100 : 0;
    const atd=sumOf(uu,'totalAlunos')? sumOf(uu,'acompanhamentoEm')/sumOf(uu,'totalAlunos')*100 : 0;
    const defs=[
      {k:'Uso do App',v:usoApp,alvo:100,peso:0.30,base:'da base apta'},
      {k:'Treinos em dia',v:treino,alvo:85,peso:0.30,base:'de quem usa o app'},
      {k:'Avaliações em dia',v:aval,alvo:75,peso:0.20,base:'unidade (proxy)'},
      {k:'Atendimento',v:atd,alvo:100,peso:0.20,base:'unidade (proxy)'},
    ];
    defs.forEach(d=>d.at=Math.min(100, d.alvo? d.v/d.alvo*100 : 0));
    return {defs, indice:Math.round(defs.reduce((a,d)=>a+d.peso*d.at,0)), eleg:eligB.length};
  }
  function metaFarol(at){ return at>=100?'#5BAD6F':at>=70?'#F2C94C':'#D64545'; }
  function metasPanel(){
    if(!D.alunos || !D.alunos.length) return '';
    const m=metasFor(state.unit);
    let h='<div class="sec">Índice de metas (0–100)</div><div class="panel"><div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">'
      +`<div style="text-align:center;min-width:96px"><div style="font-size:44px;font-weight:800;line-height:1;color:${metaFarol(m.indice)}">${m.indice}</div><div style="color:var(--muted);font-size:12px;margin-top:5px">índice ponderado</div></div>`
      +'<div style="flex:1;min-width:300px">';
    h+=m.defs.map(d=>`<div style="display:flex;align-items:center;gap:12px;margin:10px 0">
      <div style="width:172px;font-size:12.5px"><b>${d.k}</b><div style="color:var(--muted);font-size:11px">peso ${Math.round(d.peso*100)}% · ${d.base}</div></div>

      <div style="width:158px;text-align:right;font-size:12px"><b style="font-size:14px">${pct(d.v)}</b> <span style="color:var(--muted)">/ alvo ${d.alvo}%</span><div style="color:${metaFarol(d.at)};font-size:11px;font-weight:700">${Math.round(d.at)}% do alvo</div></div></div>`).join('');
    h+='</div></div>';

    h+='<div class="note"><b>Como ler:</b> o <b>peso</b> é quanto o pilar vale na nota final; a <b>barra</b> mostra o <b>atingimento</b> (atual ÷ alvo); à direita, o <b>atual</b> e o <b>alvo</b>. Índice = Σ(peso × atingimento). Pilares: <b>Uso do App</b> (peso 30%, base apta, alvo 100%) · <b>Treinos em dia</b> (30%, base = quem usa o app, alvo 85%) · <b>Avaliações em dia</b> (20%, alvo 75% — <i>proxy da unidade, a Pacto não expõe avaliação por aluno</i>) · <b>Atendimento</b> (20%, alvo 100% — <i>proxy da unidade</i>). A <b>nota do treino</b> é indicador à parte. Verde = meta batida · amarelo = perto · vermelho = distante.'
      + ((atd && atd.v<5) ? ' <b>Atendimento vem baixo</b> porque os professores ainda não registram atendimento pelo App Treino.' : '')
      + '</div>';
    return h;
  }

      <td><b>${av==null?'—':pct(av)}</b></td>
      <td>${fmt(u.acompanhamentoEm)}</td></tr>`; }).join('');
    h+='</tbody></table></div></div>';

  function renderProfs(){

    P.sort((a,b)=>b.indice-a.indice);

    const pseudo={}; PSEUDO_ORDER.forEach(k=>pseudo[k]={n:0,carteira:0});
    P=P.filter(p=>{const t=NAOPROF(p.nome); if(t){pseudo[t].n++; pseudo[t].carteira+=N(p.carteiraReal); return false;} return true;});
    const PS=state.profSort;
    if(PS.k){ const svp=(p,k)=> k==='nome'?String(p.nome||'').toLowerCase() : (k==='unit'?uName(p.unit).toLowerCase() : N(p[k]));
      P.sort((a,b)=>{const x=svp(a,PS.k),y=svp(b,PS.k); return x<y?-PS.dir:(x>y?PS.dir:0);}); }

    const medal=r=>r===0?'🥇':r===1?'🥈':r===2?'🥉':(r+1)+'º';
    const col=v=>v>=70?'#3f8a52':v>=45?'#a97c00':'#b53434'; const bg=v=>v>=70?'#E7F4EB':v>=45?'#FDF3DC':'#FBE8E8';
    const n=P.length, medEmDia=Math.round(P.reduce((a,p)=>a+N(p.pctEmDia),0)/n), venc=P.reduce((a,p)=>a+N(p.vencidos),0);

    h+='<div class="kgrid" style="grid-template-columns:repeat(3,1fr)">'
      +`<div class="kpi"><div class="n"><span class="dot" style="background:#0EA5A0"></span>Professores</div><div class="v">${fmt(n)}</div><div class="s">com vínculo de treino</div></div>`
      +`<div class="kpi"><div class="n"><span class="dot" style="background:#5BAD6F"></span>% ficha em dia (média)</div><div class="v">${pct(medEmDia)}</div><div class="s">média entre professores</div></div>`
      +`<div class="kpi"><div class="n"><span class="dot" style="background:#D64545"></span>Alunos com treino vencido</div><div class="v">${fmt(venc)}</div><div class="s">somados nas carteiras</div></div>`
      +'</div>';
    h+='<div class="sec">Ranking de atuação <span style="font-weight:600;color:var(--muted);font-size:12px">— clique num professor para ver os alunos da carteira</span></div><div class="tbl"><div class="scroll"><table><thead><tr>'
      +'<th>#</th>'+[['nome','Professor'],['unit','Unidade'],['carteiraReal','Carteira'],['comTreino','Alunos c/ treino'],['emDia','Em dia'],['vencidos','Vencidos'],['pctEmDia','% em dia'],['notaMedia','Nota'],['indice','Índice']].map(c=>`<th class="sortable" data-k="${c[0]}">${c[1]}${_sarr(PS,c[0])}</th>`).join('')+'</tr></thead><tbody>';
    h+=P.map((p,i)=>`<tr class="click" data-pid="${esc(p.id)}"><td style="font-size:15px">${medal(i)}</td><td><div class="aluno-cell">${avatar(p)}<div class="nm">${esc(p.nome)||('Prof '+(p.id||''))}</div></div></td><td>${uName(p.unit)}</td>
      <td><b>${fmt(p.carteiraReal||0)}</b></td><td>${fmt(p.comTreino)}</td><td>${fmt(p.emDia)}</td>
      <td><span class="pill ${N(p.vencidos)>0?'c-red':'c-green'}">${fmt(p.vencidos)}</span></td>
      <td>${pct(p.pctEmDia)}</td>
      <td>${N(p.notaTotal)>0?('<b>'+(Math.round(N(p.notaMedia)*100)/100).toLocaleString('pt-BR')+'</b>★ <span style="color:var(--muted);font-size:11px">('+fmt(p.notaTotal)+')</span>'):'<span style="color:var(--muted)">—</span>'}</td>
      <td><span class="pill" style="background:${bg(p.indice)};color:${col(p.indice)}">${p.indice}</span></td></tr>`).join('');
    h+='</tbody></table></div></div>';
    const totPseudo=PSEUDO_ORDER.reduce((a,k)=>a+pseudo[k].n,0);
    if(totPseudo){
      h+='<div class="sec">Atendimento fora do ranking</div><div class="ugrid">';
      h+=PSEUDO_ORDER.filter(k=>pseudo[k].n>0).map(k=>`<div class="ucard"><div class="un">${k}</div><div class="ual">${fmt(pseudo[k].n)} registro(s)</div><div class="urow"><span>Alunos na carteira</span><b>${fmt(pseudo[k].carteira)}</b></div></div>`).join('');
      h+='</div>';
    }
    // ---- Visão dedicada: Treino por IA (adesão) ----

        +`<div class="kpi"><div class="n"><span class="dot" style="background:#5BAD6F"></span>Usam o app</div><div class="v">${pct(iTot?iApp/iTot*100:0)}</div><div class="s">${fmt(iApp)} de ${fmt(iTot)}</div></div>`
        +`<div class="kpi"><div class="n"><span class="dot" style="background:#5BAD6F"></span>Treino em dia</div><div class="v">${fmt(iEmDia)}</div><div class="s">${pct(iTot?iEmDia/iTot*100:0)} do grupo</div></div>`
        +`<div class="kpi"><div class="n"><span class="dot" style="background:#D64545"></span>Treino vencido</div><div class="v">${fmt(iVenc)}</div><div class="s">a renovar</div></div>`

        h+='<div class="panel" style="margin-top:12px"><h3>Distribuição por unidade</h3>';
        h+=urows.map(u=>`<div class="urow" style="align-items:center;gap:10px"><span style="min-width:96px">${uName(u)}</span><i style="display:inline-block;height:10px;border-radius:6px;background:#7A5AA8;width:${Math.round(byU[u]/iMax*100)}%"></i><b>${fmt(byU[u])}</b></div>`).join('');
        h+='</div>';
      }
      h+='<div class="note"><b>Treino por IA</b> = alunos cujo acompanhamento é feito pela geração automática de treino (não por um professor). Grupo identificado pelo marcador no campo professor; métricas de uso do app e treino em dia vêm das mesmas fontes por-aluno do CRM.</div>';
    }
    el.innerHTML=h;
    el.querySelectorAll('tr.click').forEach(tr=>tr.onclick=()=>profDrawer(tr.dataset.pid));

  }
  function profDrawer(pid){
    const prof=(D.professores||[]).find(p=>String(p.id)===String(pid))||{};
    const ord={risco:0,morno:1,engajado:2,semdado:3};
    const alunos=(D.alunos||[]).filter(a=>String(a.professorId)===String(pid))
      .sort((a,b)=>(ord[a.faixa]??9)-(ord[b.faixa]??9));
    let h=`<button class="pmx" onclick="document.getElementById('pmodal').classList.remove('on')">&times;</button>`;
    h+=`<div style="display:flex;align-items:center;gap:12px;margin:0 0 14px">${avatar(prof)}<div><h3 style="margin:0 0 2px;font-size:16px">${esc(prof.nome)||'Professor'}</h3><p class="sub" style="margin:0">${uName(prof.unit)} · ${fmt(alunos.length)} alunos na carteira</p></div></div>`;
    if(!alunos.length){ h+='<div class="empty" style="border:none;padding:24px">Sem alunos vinculados nesta coleta.</div>'; }
    else { h+='<div class="tbl"><div class="scroll" style="max-height:56vh"><table><thead><tr><th>Aluno</th><th>Usa app</th><th>Contrato</th><th>Faixa</th></tr></thead><tbody>'
      +alunos.map(a=>{const f=FA[a.faixa]||['—','']; return `<tr><td><div class="aluno-cell"><span class="av">${iniciais(a.nome)}</span><div><div class="nm">${esc(a.nome)}</div><div class="ct">${esc(a.email||'')}</div></div></div></td><td>${appPill(a.usaApp)}</td><td>${contratoPill(a.diasContrato)}</td><td><span class="pill ${f[1]}">${f[0]}</span></td></tr>`;}).join('')
      +'</tbody></table></div></div>'; }

    document.getElementById('pmodal').classList.add('on');
  }

  // ---------- CRM 360º por aluno ----------
  const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const iniciais = nome => { const p=(nome||'').trim().split(/\s+/).filter(Boolean); return ((p[0]||'?')[0]+(p.length>1?p[p.length-1][0]:'')).toUpperCase(); };
  // Classifica registros que NÃO são professores (ficam fora do ranking/médias)
  const _upp = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
  const NAOPROF = nome => { const u=' '+_upp(nome)+' ';
    if(/PERSONAL EXTERNO/.test(u)) return 'Personal Externo';
    if(/TREINO POR IA|\bIA\b/.test(u)) return 'Treino por IA';

    return null; };
  const PSEUDO_ORDER=['Personal Externo','Sem Professor','Treino por IA','Gestão'];
  const FA = {engajado:['Engajado','c-green'], morno:['Morno','c-amber'], risco:['Em risco','c-red']};

  function treinoPill(v){ return v==='emdia'?'<span class="pill c-green">Em dia</span>':v==='vencido'?'<span class="pill c-red">Vencido</span>':'<span class="pill" style="background:#EEE;color:#999">—</span>'; }
  function contratoPill(d){ if(d==null) return '<span class="pill c-green">ativo</span>'; if(d<0) return '<span class="pill c-red">vencido</span>'; if(d<=30) return `<span class="pill c-amber">vence em ${d}d</span>`; if(d<=90) return `<span class="pill" style="background:#EEF1F6;color:#5a6b86">${d}d</span>`; return `<span class="pill c-green">${d}d</span>`; }
  function avatar(a){ const ini=iniciais(a.nome); return a.foto?`<span class="av">${ini}<img class="avimg" src="${esc(a.foto)}" onerror="this.remove()" alt=""></span>`:`<span class="av">${ini}</span>`; }
  // ---------- Modalidade (7 baldes, via contrato) ----------
  const MOD_ORDER=['Fitness','Agua','Luta','Ambos (Agua+Fitness)','Ambos (Agua+Luta)','Ambos (Fitness+Luta)','Ambos (Agua+Fitness+Luta)','Outros'];
  const MOD_LABEL={'Fitness':'Fitness','Agua':'Água','Luta':'Luta','Ambos (Agua+Fitness)':'Ambos · Água+Fitness','Ambos (Agua+Luta)':'Ambos · Água+Luta','Ambos (Fitness+Luta)':'Ambos · Fitness+Luta','Ambos (Agua+Fitness+Luta)':'Ambos · Água+Fitness+Luta','Outros':'Outros'};
  const MOD_COLOR={'Fitness':'#E8521A','Agua':'#3E6DAA','Luta':'#7A5AA8','Ambos (Agua+Fitness)':'#5BAD6F','Ambos (Agua+Luta)':'#0EA5A0','Ambos (Fitness+Luta)':'#F2C94C','Ambos (Agua+Fitness+Luta)':'#2D8F5A','Outros':'#8A8A8A'};
  const modKey = a => MOD_ORDER.includes(a&&a.modalidade)?a.modalidade:'Outros';
  function modPill(m){ const k=MOD_ORDER.includes(m)?m:'Outros'; const c=MOD_COLOR[k]; return `<span class="pill" style="background:${c}22;color:${c}">${MOD_LABEL[k]}</span>`; }
  function modDist(list){ const d={}; MOD_ORDER.forEach(k=>d[k]=0); list.forEach(a=>{d[modKey(a)]++;}); return d; }

  // Público-alvo do App Treino = plano que CONTÉM Fitness (Fitness, Ambos A+F, F+L, A+F+L).

  const ELEG = a => /Fitness/i.test(String(a && a.modalidade || ''));
  const crmBaseFull = () => (D.alunos||[]).filter(a=> state.unit==='all' || a.unit===state.unit);
  const crmBase = () => crmBaseFull().filter(ELEG);   // base das métricas do app = público-alvo
  // Recência de uso do App (P0) — dias desde o último acesso registrado (dataUltimoacesso)
  const REC_ORDER=['0-7','8-14','15-30','31-60','60+','semreg'];
  const REC_LABEL={'0-7':'0–7 dias','8-14':'8–14 dias','15-30':'15–30 dias','31-60':'31–60 dias','60+':'60+ dias','semreg':'Sem registro'};
  const REC_COLOR={'0-7':'#5BAD6F','8-14':'#8FBF5B','15-30':'#F2C94C','31-60':'#E8934C','60+':'#D64545','semreg':'#9B96A0'};
  function recBucket(a){ const d=a&&a.recenciaDias; if(d==null) return 'semreg'; if(d<=7)return '0-7'; if(d<=14)return '8-14'; if(d<=30)return '15-30'; if(d<=60)return '31-60'; return '60+'; }
  function recPill(a){ const d=a&&a.recenciaDias; if(d==null) return '<span class="pill" style="background:#EEE;color:#999">—</span>'; const k=recBucket(a),c=REC_COLOR[k]; return `<span class="pill" style="background:${c}22;color:${c}">${d}d</span>`; }
  const contratoBucket = d => d==null? 'vigente' : (d<0?'vencido':(d<=30?'vencendo':'vigente'));
  const _fld = (label,ctrl) => `<div class="fld"><label>${label}</label>${ctrl}</div>`;
  const _sel = (id,opts,cur) => `<select class="fsel" data-sel="${id}">`+opts.map(o=>`<option value="${esc(String(o[0]))}" ${String(o[0])===String(cur)?'selected':''}>${esc(o[1])}</option>`).join('')+`</select>`;
  const _sarr = (st,k) => st.k===k ? `<span class="sar">${st.dir>0?'▲':'▼'}</span>` : '';
  function sortValAluno(a,k){
    switch(k){
      case 'faixa': return ({risco:0,morno:1,engajado:2}[a.faixa]??9);

      case 'score': return scoreAluno(a);
      case 'modalidade': return MOD_ORDER.indexOf(modKey(a));
      case 'fazTreino': return a.fazTreino===true?1:(a.fazTreino===false?0:-1);
      case 'treino': return a.treinoStatus==='vencido'?0:(a.treinoStatus==='emdia'?2:1);
      case 'recencia': return (a.recenciaDias==null?1e9:a.recenciaDias);

  function crmFiltered(){
    let A=crmBase();

    if(state.crmSort.k){
      const k=state.crmSort.k, dir=state.crmSort.dir;

    }

  const PER=40;

      +`<div class="kpi"><div class="n"><span class="dot" style="background:#5BAD6F"></span>Engajados</div><div class="v">${fmt(ne)}</div><div class="s">usam o app + contrato ok</div></div>`

  // ---------- Score 0–100 + Score & Ações ----------
  function scoreAluno(a){
    let s=0;
    s += a.usaApp===true?40:(a.usaApp==null?15:0);
    s += a.fazTreino===true?30:(a.fazTreino==null?10:0);
    const d=a.diasContrato;
    s += (d==null||d>90)?30:(d>30?22:(d>0?12:0));
    return Math.max(0,Math.min(100,Math.round(s)));
  }
  function scoreCol(v){return v>=70?'#3f8a52':v>=45?'#a97c00':'#b53434';}
  function scoreBg(v){return v>=70?'#E7F4EB':v>=45?'#FDF3DC':'#FBE8E8';}
  function scorePill(v){return `<span class="pill" style="background:${scoreBg(v)};color:${scoreCol(v)}">${v}</span>`;}
  // ---------- Índice de Saúde do Aluno (ISA) — P0-3 (pesos v1, a calibrar com histórico de perdas) ----------
  const ISA_W={eng:0.35,tr:0.30,ct:0.25,vin:0.10};
  function isaSub(a){
    const d=a.recenciaDias;
    const eng = d==null ? (a.usaApp===true?55:20) : (d<=7?100:d<=14?80:d<=30?55:d<=60?30:10);
    const tr  = a.treinoStatus==='emdia'?100:(a.treinoStatus==='vencido'?35:10);
    const dc=a.diasContrato;
    const ct  = dc==null?75:(dc<0?15:dc<=30?55:dc<=90?82:100);
    const np=NAOPROF(a.professor);
    const vin = (a.fazTreino===true && a.professor && !np)?100:(np==='Sem Professor'?25:(a.fazTreino===true?85:40));
    return {eng,tr,ct,vin};
  }
  function isaScore(a){const s=isaSub(a);return Math.round(s.eng*ISA_W.eng+s.tr*ISA_W.tr+s.ct*ISA_W.ct+s.vin*ISA_W.vin);}
  function isaFaixa(v){return v>=80?['Saudável','#3f8a52','#E7F4EB']:v>=60?['Atenção','#a97c00','#FDF3DC']:v>=40?['Risco moderado','#B5731A','#FBE8DC']:v>=20?['Risco alto','#b53434','#FBE8E8']:['Crítico','#8B1A1A','#F3D2D2'];}
  const ISA_KEYS=['sau','ate','rmo','ralto','crit'];
  function isaKey(v){return v>=80?'sau':v>=60?'ate':v>=40?'rmo':v>=20?'ralto':'crit';}
  const ISA_LABEL={sau:'Saudável',ate:'Atenção',rmo:'Risco moderado',ralto:'Risco alto',crit:'Crítico'};
  function isaPill(a){const v=isaScore(a),f=isaFaixa(v);return `<span class="pill" style="background:${f[2]};color:${f[1]}" title="${f[0]}">${v}</span>`;}
  const ISA_DIM=[['eng','Engajamento (recência)'],['tr','Atualidade do treino'],['ct','Saúde do contrato'],['vin','Vínculo com professor']];
  function isaAcao(a){const s=isaSub(a);const low=['eng','tr','ct','vin'].reduce((m,k)=>s[k]<s[m]?k:m,'eng');
    return low==='eng'?'Reengajar no app / resgate':low==='tr'?'Renovar ou prescrever treino':low==='ct'?'Contato de renovação':'Vincular a um professor';}
  function alunoDrawer(mat){
    const a=(D.alunos||[]).find(x=>String(x.matricula)===String(mat)); if(!a) return;
    const v=isaScore(a),f=isaFaixa(v),s=isaSub(a);
    let h=`<button class="pmx" onclick="document.getElementById('pmodal').classList.remove('on')">&times;</button>`;
    h+=`<div style="display:flex;align-items:center;gap:12px;margin:0 0 6px"><span class="av">${iniciais(a.nome)}</span><div style="flex:1"><h3 style="margin:0 0 3px;font-size:16px">${esc(a.nome)}</h3><p class="sub" style="margin:0">${uName(a.unit)} · ${modPill(a.modalidade)} · ${esc(a.professor)||'sem professor'}</p></div><div style="text-align:right"><div style="font-size:34px;font-weight:800;line-height:1;color:${f[1]}">${v}</div><span class="pill" style="background:${f[2]};color:${f[1]}">${f[0]}</span></div></div>`;
    h+='<div style="font-size:12px;color:var(--muted);margin:14px 2px 6px">Por que este score (0–100 por dimensão)</div>';
    h+=ISA_DIM.map(dm=>{const val=s[dm[0]];const c=val>=70?'#5BAD6F':val>=40?'#F2C94C':'#D64545';return `<div style="display:flex;align-items:center;gap:10px;margin:6px 0"><span style="width:172px;font-size:12px;color:var(--muted)">${dm[1]} <span style="font-size:10px">(${Math.round(ISA_W[dm[0]]*100)}%)</span></span><div class="bar"><i style="width:${val}%;background:${c}"></i></div><span style="width:34px;text-align:right;font-size:12px;font-weight:700">${val}</span></div>`;}).join('');
    h+=`<div class="urow" style="margin-top:14px"><span><b>Ação sugerida</b></span><b style="color:${f[1]}">${isaAcao(a)}</b></div>`;
    h+=`<div style="font-size:12px;color:var(--muted);margin-top:14px;margin-bottom:4px">Dados do aluno</div><div class="tbl"><table style="width:100%;font-size:12.5px"><tbody>
      <tr><td class="muted" style="padding:4px 0">Último acesso ao treino</td><td style="text-align:right">${a.recenciaDias!=null?a.recenciaDias+' dias atrás':'<span style="color:#999">sem registro</span>'}</td></tr>
      <tr><td class="muted" style="padding:4px 0">Treino</td><td style="text-align:right">${treinoPill(a.treinoStatus)}</td></tr>
      <tr><td class="muted" style="padding:4px 0">Usa o app (Pacto)</td><td style="text-align:right">${appPill(a.usaApp)}</td></tr>
      <tr><td class="muted" style="padding:4px 0">Contrato</td><td style="text-align:right">${contratoPill(a.diasContrato)}</td></tr>
      <tr><td class="muted" style="padding:4px 0">Contato</td><td style="text-align:right">${esc(a.email||'—')}${a.telefone?' · '+esc(a.telefone):''}</td></tr>
    </tbody></table></div>`;
    h+='<p class="sub" style="margin:12px 2px 0">ISA v1 — pesos ilustrativos (engajamento 35% · treino 30% · contrato 25% · vínculo 10%), a calibrar com o histórico de perdas. Frequência presencial e avaliação por aluno entram quando integradas.</p>';
    document.getElementById('pmodalc').innerHTML=h;
    document.getElementById('pmodal').classList.add('on');
  }
  const INIS = {
    reativar: {t:'Reativar contrato',    ac:'Contato de retenção / renovação',       c:'#D64545'},
    retencao: {t:'Retenção (em risco)',  ac:'Ligar + reengajar no app',              c:'#D64545'},
    instalar: {t:'Instalar o App Treino',ac:'Onboarding do app na próxima visita',    c:'#7A5AA8'},
    renovar:  {t:'Renovação antecipada', ac:'Oferecer renovação (contrato ≤30d)',     c:'#F2C94C'},
  };
  function iniDe(a){
    const d=a.diasContrato;
    if(d!=null && d<0) return 'reativar';
    if(a.faixa==='risco' && a.usaApp!==true) return 'retencao';
    if(a.fazTreino===true && a.usaApp!==true) return 'instalar';
    if(d!=null && d>=0 && d<=30) return 'renovar';
    return null;
  }
  function scoreFila(){
    let f=crmBase().map(a=>({a,ini:iniDe(a),sc:scoreAluno(a)})).filter(x=>x.ini);
    if(state.scoreIni!=='all')      f=f.filter(x=>x.ini===state.scoreIni);
    if(state.scoreProf!=='all')     f=f.filter(x=>String(x.a.professor||'—')===state.scoreProf);
    if(state.scoreContrato!=='all') f=f.filter(x=>contratoBucket(x.a.diasContrato)===state.scoreContrato);
    const qq=(state.scoreQ||'').trim().toLowerCase();
    if(qq) f=f.filter(x=>String(x.a.nome||'').toLowerCase().includes(qq)||String(x.a.email||'').toLowerCase().includes(qq));
    if(state.scoreSort.k){
      const k=state.scoreSort.k, dir=state.scoreSort.dir;
      const sv=x=> k==='score'?x.sc : (k==='motivo'?x.ini : String((k==='nome'?x.a.nome:(k==='unitNome'?x.a.unitNome:x.a.professor))||'').toLowerCase());
      f.sort((a,b)=>{const p=sv(a),q=sv(b); return p<q?-dir:(p>q?dir:0);});
    } else {
      const ord={reativar:0,retencao:1,instalar:2,renovar:3};
      f.sort((x,y)=> (x.sc-y.sc) || (ord[x.ini]-ord[y.ini]));
    }
    return f;
  }
  function renderScoreResults(){
    const box=document.getElementById('scoreResults'); if(!box) return;
    const F=scoreFila(); const pages=Math.max(1,Math.ceil(F.length/PER));
    if(state.scorePage>pages) state.scorePage=pages; if(state.scorePage<1) state.scorePage=1;
    const start=(state.scorePage-1)*PER, rows=F.slice(start,start+PER);
    const showUnit=state.unit==='all';
    const SS=state.scoreSort, STH=(k,l)=>`<th class="sortable" data-k="${k}">${l}${_sarr(SS,k)}</th>`;
    let h='<div class="tbl rtable"><div class="scroll"><table><thead><tr>'
      +STH('nome','Aluno')+(showUnit?STH('unitNome','Unidade'):'')+STH('professor','Professor')+STH('motivo','Motivo')+'<th>Ação sugerida</th>'+STH('score','Score')+'</tr></thead><tbody>';
    if(!rows.length){ h+=`<tr><td colspan="${showUnit?6:5}"><div class="empty" style="border:none;padding:26px">Sem alunos nesta iniciativa. 🎉</div></td></tr>`; }
    rows.forEach(x=>{ const a=x.a, I=INIS[x.ini]; h+=`<tr>
      <td data-label="Aluno"><div class="aluno-cell">${avatar(a)}<div><div class="nm">${esc(a.nome)||'—'}</div><div class="ct">${esc(a.email||'')}</div></div></div></td>`
      +(showUnit?`<td class="muted" data-label="Unidade">${esc(a.unitNome)}</td>`:'')
      +`<td class="muted" data-label="Professor">${esc(a.professor)||'—'}</td>
      <td data-label="Motivo"><span class="pill" style="background:#F1F0EC;color:${I.c}">${I.t}</span></td>
      <td data-label="Ação" style="font-size:12.5px;color:var(--muted)">${I.ac}</td>
      <td data-label="Score">${scorePill(x.sc)}</td></tr>`; });
    h+='</tbody></table></div>';
    h+=`<div class="pager"><span style="color:var(--muted);font-size:12.5px">${fmt(F.length)} aluno(s) na fila · página ${state.scorePage} de ${pages}</span>
      <span style="display:flex;gap:8px"><button class="pbtn" data-p="prev" ${state.scorePage<=1?'disabled':''}>‹ Anterior</button>
      <button class="pbtn" data-p="next" ${state.scorePage>=pages?'disabled':''}>Próxima ›</button></span></div></div>`;
    box.innerHTML=h;
    box.querySelectorAll('.pbtn').forEach(b=>b.onclick=()=>{ state.scorePage+=(b.dataset.p==='next'?1:-1); renderScoreResults(); window.scrollTo({top:0,behavior:'smooth'}); });
    box.querySelectorAll('th.sortable').forEach(t=>t.onclick=()=>{ const k=t.dataset.k; if(state.scoreSort.k===k) state.scoreSort.dir*=-1; else {state.scoreSort.k=k;state.scoreSort.dir=1;} state.scorePage=1; renderScoreResults(); });
  }
  function renderScore(){
    const el=document.getElementById('v-score');
    if(!D.alunos || !D.alunos.length){ el.innerHTML='<div class="empty" style="margin-top:20px"><b>Score &amp; Ações disponível após a próxima coleta.</b><br>Rode o workflow "Coleta + Publica" com deploy=true.</div>'; return; }
    const B=crmBase();
    const fila=B.map(a=>({a,ini:iniDe(a)})).filter(x=>x.ini);
    const cnt={}; Object.keys(INIS).forEach(k=>cnt[k]=0); fila.forEach(x=>cnt[x.ini]++);
    const avg=Math.round(B.reduce((s,a)=>s+scoreAluno(a),0)/(B.length||1));
    const vol=[
      {t:'Não usam o App Treino',         n:B.filter(a=>a.usaApp===false).length,        crit:'aptos com "usa o app" = Não', ac:'campanha de instalação/onboarding', c:'#7A5AA8'},
      {t:'Não fazem treino (sem vínculo)',n:B.filter(a=>a.fazTreino===false).length,      crit:'aptos sem vínculo com professor de treino', ac:'encaminhar p/ prescrição', c:'#0EA5A0'},
      {t:'Contrato vencido',              n:B.filter(a=>a.diasContrato!=null&&a.diasContrato<0).length, crit:'contrato com dias < 0', ac:'reativação / renovação', c:'#D64545'},
      {t:'Alunos em risco',               n:B.filter(a=>a.faixa==='risco').length,        crit:'não usam o app + contrato vencendo/vencido', ac:'contato de retenção', c:'#D64545'},
      {t:'Contrato vence em ≤30d',        n:B.filter(a=>a.diasContrato!=null&&a.diasContrato>=0&&a.diasContrato<=30).length, crit:'contrato entre 0 e 30 dias', ac:'renovação antecipada', c:'#F2C94C'},
    ].sort((x,y)=>y.n-x.n);
    const maxVol=Math.max(1,...vol.map(v=>v.n));
    let h='<div class="sec">Score &amp; Ações — '+(state.unit==='all'?'rede':uName(state.unit))+'</div>';
    h+='<div class="kgrid" style="grid-template-columns:repeat(4,1fr)">'
      +`<div class="kpi"><div class="n"><span class="dot" style="background:#E8521A"></span>Índice médio</div><div class="v">${avg}</div><div class="s">score 0–100 da seleção</div></div>`
      +`<div class="kpi"><div class="n"><span class="dot" style="background:#D64545"></span>Na fila de ação</div><div class="v">${fmt(fila.length)}</div><div class="s">alunos que pedem ação agora</div></div>`
      +`<div class="kpi"><div class="n"><span class="dot" style="background:#7A5AA8"></span>Instalar o app</div><div class="v">${fmt(cnt.instalar)}</div><div class="s">fazem treino e não usam o app</div></div>`
      +`<div class="kpi"><div class="n"><span class="dot" style="background:#F2C94C"></span>Renovar (≤30d)</div><div class="v">${fmt(cnt.renovar)}</div><div class="s">contrato vencendo</div></div>`
      +'</div>';
    h+='<div class="panel" style="margin-top:16px"><h3>Ações priorizadas por volume</h3><p class="sub">o que dá mais resultado primeiro — nº de alunos impactados na seleção</p>';
    h+=vol.map(v=>`<div style="display:flex;align-items:center;gap:12px;margin:11px 0">
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${v.t} <span style="color:var(--muted);font-weight:400;font-size:11px">— ${v.ac}</span></div><div style="color:var(--muted);font-size:11px">critério: ${v.crit}</div></div>
      <div class="bar" style="max-width:320px"><i style="width:${v.n/maxVol*100}%;background:${v.c}"></i></div>
      <div style="font-weight:800;font-size:15px;min-width:64px;text-align:right">${fmt(v.n)}</div></div>`).join('');
    h+='</div>';
    const profOpts=[['all','Todos os professores']].concat([...new Set(B.map(a=>String(a.professor||'—')))].filter(Boolean).sort((x,y)=>x.localeCompare(y,'pt')).map(p=>[p,p]));
    const unitOpts=[['all','Todas as unidades']].concat(ALL.map(u=>[u.id,u.nome]));
    const iniOpts=[['all','Todas as iniciativas']].concat(Object.keys(INIS).map(k=>[k,INIS[k].t]));
    h+='<div class="sec">Fila de iniciativas</div>';
    h+='<div class="filterbar">'
      +_fld('Buscar','<input class="finp" id="scoreSearch" type="text" placeholder="nome ou e-mail…" value="'+esc(state.scoreQ||'')+'">')
      +_fld('Unidade',_sel('scoreUnitSel',unitOpts,state.unit))
      +_fld('Professor',_sel('scoreProf',profOpts,state.scoreProf))
      +_fld('Contrato',_sel('scoreContrato',[['all','Todos'],['vigente','Vigente'],['vencendo','Vence ≤30d'],['vencido','Vencido']],state.scoreContrato))
      +_fld('Iniciativa',_sel('scoreIni',iniOpts,state.scoreIni))
      +'</div><p class="sub" style="margin:0 2px 4px">Clique no cabeçalho de qualquer coluna para ordenar.</p>';
    h+='<div id="scoreResults" style="margin-top:8px"></div>';
    el.innerHTML=h;
    el.querySelectorAll('.fsel').forEach(s=>s.onchange=()=>{ const id=s.dataset.sel, v=s.value;
      if(id==='scoreUnitSel'){ state.unit=v; state.scorePage=1; renderChips(); renderGeral(); renderProfs(); renderCRM(); renderScore(); return; }
      state[id]=v; state.scorePage=1; renderScore(); });
    const ssb=document.getElementById('scoreSearch');
    if(ssb){ ssb.oninput=()=>{ state.scoreQ=ssb.value; state.scorePage=1; renderScoreResults(); }; }
    renderScoreResults();
  }

  // filtros + abas
  function renderChips(){
    const chips=[{id:'all',nome:'Todas as unidades'}].concat(ALL.map(u=>({id:u.id,nome:u.nome})));
    document.getElementById('unitChips').innerHTML='<span class="flab">Unidade</span>'+chips.map(c=>`<button class="chip ${state.unit===c.id?'on':''}" data-u="${c.id}">${c.nome}</button>`).join('');
    document.querySelectorAll('#unitChips .chip').forEach(b=>b.onclick=()=>{state.unit=b.dataset.u; state.crmPage=1; state.scorePage=1; renderChips(); renderGeral(); renderProfs(); renderCRM(); renderScore();});
  }
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    state.tab=t.dataset.v;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
    document.querySelectorAll('.view').forEach(s=>s.classList.remove('on'));
    document.getElementById('v-'+state.tab).classList.add('on');
  });
  document.getElementById('pmodal').onclick=e=>{ if(e.target.id==='pmodal') document.getElementById('pmodal').classList.remove('on'); };
  renderChips(); renderGeral(); renderUnidades(); renderProfs(); renderCRM(); renderScore(); renderMetodo();
})();
</script>
<script>
// Alternador de tema (claro/escuro) — persiste em localStorage. Extensão fora do brand light-first.
(function(){
  var btn=document.getElementById('themeBtn'); if(!btn) return;
  function cur(){ return document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light'; }
  function icon(){ btn.textContent = cur()==='dark' ? '☀️' : '🌙'; btn.title='Tema '+(cur()==='dark'?'escuro':'claro')+' — clique para alternar'; }
  icon();
  btn.addEventListener('click',function(){
    var next = cur()==='dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try{ localStorage.setItem('nadarte-theme', next); }catch(e){}
    icon();
  });
})();
</script>
</body>
</html>
