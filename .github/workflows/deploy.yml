name: Coleta + Publica (App Treino)

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Publicar no Cloudflare? (false = so validar)"
        type: boolean
        default: false
      diag:
        description: "Modo diagnostico? (rapido, sem uso-do-app; grava history/diag.json)"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: apptreino-build
  cancel-in-progress: false

permissions:
  contents: write   # necessario para salvar history/serie.json de volta no repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Coletar dados da API PACTO
        env:
          PACTO_KEY_716NORTE: ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_KEY_905SUL:    ${{ secrets.PACTO_KEY_905SUL }}
          PACTO_KEY_604NORTE:  ${{ secrets.PACTO_KEY_604NORTE }}
          PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
          PACTO_KEY_LAGOSUL:   ${{ secrets.PACTO_KEY_LAGOSUL }}
          PACTO_KEY_NATAL:     ${{ secrets.PACTO_KEY_NATAL }}
          PACTO_DIAG: ${{ inputs.diag }}
        run: python scripts/pacto_fetch_treino.py

      - name: Montar + GATE (nao publica se o dado nao fechar)
        run: python scripts/build_treino.py

      - name: Publicar no Cloudflare Pages
        # publica automaticamente no cron diario; no run manual, so se marcar deploy=true
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.deploy == true) }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm i -g wrangler
          wrangler pages deploy public --project-name=nadarte-apptreino --branch=main

      - name: Salvar diagnostico (modo diag) no repo
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.diag == true }}
        run: |
          if [ -f history/diag.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add history/diag.json
            git commit -m "diag: distribuicao de situacao" || echo "sem mudancas no diag"
            git push || echo "nada a enviar"
          fi

      - name: Salvar historico (agregado, sem PII) no repo
        # so nas publicacoes (cron diario ou run manual com deploy=true)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.deploy == true) }}
        run: |
          if [ -f history/serie.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add history/serie.json history/modalidade_cache.json 2>/dev/null || git add history/serie.json
            git commit -m "hist: snapshot diario + cache modalidade" || echo "sem mudancas no historico"
            git push || echo "nada a enviar"
          fi
